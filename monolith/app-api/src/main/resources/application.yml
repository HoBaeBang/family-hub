spring:
  application:
    name: family-hub-api
  datasource:
    url: jdbc:mysql://localhost:3306/family_hub_db?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: familyhub
    password: familyhub
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

jwt:
  private-key-path: classpath:keys/private.pem
  public-key-path: classpath:keys/public.pem

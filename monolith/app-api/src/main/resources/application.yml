spring:
  application:
    name: family-hub-api
  datasource:
    url: jdbc:mysql://localhost:3306/family_hub_db?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: familyhub
    password: familyhub
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
  session:
    store-type: redis
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/api/v1/auth/oauth2/callback/{registrationId}"
            scope: openid, email, profile

oauth2:
  redirect-uri: http://localhost:3000/auth/callback

server:
  port: 8080

jwt:
  private-key-path: classpath:keys/private.pem
  public-key-path: classpath:keys/public.pem
